apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: smee-a-record
spec:
  name: smee.$(BRANCH).kfirs.com.
  type: CNAME
  ttl: 300
  managedZoneRef:
    name: kfirs-com
    namespace: domains
  rrdatas:
    - traefik.kfirs.com.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: smee
spec:
  secretName: smee-tls
  issuerRef:
    kind: ClusterIssuer
    name: google-clouddns
  dnsNames:
    - smee.$(BRANCH).kfirs.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: smee
    app.kubernetes.io/version: 1.0.0
  name: smee
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: smee
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smee
    spec:
      containers:
        - image: ghcr.io/probot/smee.io:v1.0.0
          name: smee
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 150m
              memory: 64Mi
      nodeSelector:
        gke.kfirs.com/purpose: workloads
      tolerations:
        - effect: NoExecute
          key: gke.kfirs.com/purpose
          operator: Equal
          value: workloads
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: smee
  name: smee
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector:
    app.kubernetes.io/name: smee
  type: ClusterIP
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: smee-https
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: Host(`smee.$(BRANCH).kfirs.com.`)
      services:
        - kind: Service
          name: smee
          namespace: $(BRANCH)
          port: http
  tls:
    secretName: smee-tls
