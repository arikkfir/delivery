apiVersion: dns.cnrm.cloud.google.com/v1beta1
kind: DNSRecordSet
metadata:
  name: echoserver-a-record
spec:
  name: echo.$(BRANCH).kfirs.com.
  type: CNAME
  ttl: 300
  managedZoneRef:
    name: kfirs-com
    namespace: domains
  rrdatas:
    - traefik.kfirs.com.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: echoserver
spec:
  secretName: echoserver-tls
  issuerRef:
    kind: ClusterIssuer
    name: google-clouddns
  dnsNames:
    - echo.$(BRANCH).kfirs.com
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: echoserver
spec:
  interval: 5m
  releaseName: echoserver
  chart:
    spec:
      chart: echo-server
      sourceRef:
        kind: HelmRepository
        name: echoserver
        namespace: commons
  values:
    replicaCount: 1
    image:
      tag: 0.7.0
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 50m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 128Mi
    application:
      enable:
        cookies: true
        environment: false
        file: true
        header: true
        host: true
        http: true
        request: true
    nodeSelector:
      gke.kfirs.com/purpose: workloads
    tolerations:
      - effect: NoExecute
        key: gke.kfirs.com/purpose
        operator: Equal
        value: workloads
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: echoserver-https
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: Host(`echo.$(BRANCH).kfirs.com.`)
      services:
        - kind: Service
          name: echoserver
          namespace: echoserver
          port: http
  tls:
    secretName: echoserver-tls
