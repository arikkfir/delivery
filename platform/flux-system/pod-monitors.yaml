apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: helm-controller
spec:
  selector:
    matchLabels:
      app: helm-controller
  endpoints:
  - port: http-prom
    path: /metrics
    scheme: http
    interval: 10s
---
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: kustomize-controller
spec:
  selector:
    matchLabels:
      app: kustomize-controller
  endpoints:
    - port: http-prom
      path: /metrics
      scheme: http
      interval: 10s
---
apiVersion: monitoring.googleapis.com/v1
