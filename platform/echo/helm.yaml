apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: echoserver
spec:
  interval: 10m
  url: https://ealenn.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: echoserver
spec:
  interval: 5m
  chart:
    spec:
      chart: echo-server
      sourceRef:
        kind: HelmRepository
        name: echoserver
      interval: 1m
  values:
    replicaCount: 1
    image:
      tag: 0.7.0
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 50m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 128Mi
    application:
      enable:
        cookies: false
        environment: false
        file: false
        header: false
        host: true
        http: true
        request: true
