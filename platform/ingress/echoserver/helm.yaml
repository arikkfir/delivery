apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: echoserver
spec:
  interval: 5m
  url: https://ealenn.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: echoserver
spec:
  interval: 5m
  chart:
    spec:
      chart: echo-server
      sourceRef:
        kind: HelmRepository
        name: echoserver
  values:
    replicaCount: 1
    image:
      tag: 0.7.0
    ingress:
      enabled: false
    resources:
      limits:
        cpu: 50m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 128Mi
    application:
      enable:
        cookies: true
        environment: false
        file: true
        header: true
        host: true
        http: true
        request: true
    nodeSelector:
      gke.kfirs.com/purpose: workloads
    tolerations:
      - effect: NoExecute
        key: gke.kfirs.com/purpose
        operator: Equal
        value: workloads
