apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml

patches:
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/part-of=flux
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector/gke.kfirs.com~1purpose
        value: workloads
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: gke.kfirs.com/purpose
            operator: Equal
            value: workloads
            effect: NoExecute
