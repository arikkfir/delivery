apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: domains
  namespace: platform
spec:
  dependsOn:
    - name: gke
      namespace: platform
    - name: secrets-store-csi-driver
      namespace: platform
  interval: 1m
  path: platform/domains
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
