apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: secrets-store-csi-driver
  namespace: platform
spec:
  interval: 5m
  path: platform/secrets-store-csi/driver
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: secrets-store-csi-driver-provider-gcp
  namespace: platform
spec:
  dependsOn:
    - name: gke
      namespace: platform
    - name: secrets-store-csi-driver
      namespace: platform
  interval: 5m
  path: platform/secrets-store-csi//providers/gcp
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
