apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: cert-manager
  namespace: platform
spec:
  dependsOn:
    - name: domains
      namespace: platform
    - name: gke
      namespace: platform
  interval: 1m
  path: platform/lets-encrypt/cert-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: cert-manager-cluster-issuers
  namespace: platform
spec:
  dependsOn:
    - name: cert-manager
      namespace: platform
  interval: 1m
  path: platform/lets-encrypt/cluster-issuers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
